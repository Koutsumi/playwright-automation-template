trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '22'
  displayName: 'Install Node.js'

- script: npm install
  displayName: 'npm install'

# Adicionar IP à Allowlist do MongoDB Atlas com Digest Auth
- script: |
    IP_ADDRESS=$(curl -s ifconfig.me)
    echo "Adding IP ${IP_ADDRESS} to MongoDB Atlas allowlist..."

    # Faz a requisição e captura o status code
    STATUS_CODE=$(curl -s -o response.json -w "%{http_code}" \
      --digest \
      --user "${MONGO_PUBLIC_KEY}:$MONGO_PRIVATE_KEY" \
      --request POST \
      --header "Content-Type: application/json" \
      --header "Accept: application/vnd.atlas.2023-01-01+json" \
      --data "[{ \"comment\": \"Pipeline Playwright Tests\", \"ipAddress\": \"${IP_ADDRESS}\" }]" \
      "https://cloud.mongodb.com/api/atlas/v2/groups/${MONGO_GROUP_ID}/accessList")

    echo "Response status: $STATUS_CODE"
    echo "Response body:"
    cat response.json
    echo ""

    # Verifica se o status foi 200 ou 201
    if [[ "$STATUS_CODE" -ne 200 && "$STATUS_CODE" -ne 201 ]]; then
      echo "❌ Failed to add IP to MongoDB Atlas. Exiting..."
      exit 1
    else
      echo "✅ IP successfully added to MongoDB Atlas."
    fi
  displayName: 'Add IP to MongoDB Atlas allowlist'
  env:
    MONGO_PRIVATE_KEY: $(MONGO_PRIVATE_KEY)

- script: npx playwright install --with-deps
  displayName: 'Install Playwright browsers'

- script: npx playwright test
  displayName: 'Run Playwright tests'

- task: PublishTestResults@2
  displayName: 'Publish test results'
  inputs:
    searchFolder: 'test-results'
    testResultsFormat: 'JUnit'
    testResultsFiles: 'junit-results.xml'
    mergeTestResults: true
    failTaskOnFailedTests: true
    testRunTitle: 'My End-To-End Tests'
  condition: succeededOrFailed()

# Remover IP da Allowlist do MongoDB Atlas
- script: |
    IP_ADDRESS=$(curl -s ifconfig.me)
    echo "Removing IP ${IP_ADDRESS} from MongoDB Atlas allowlist..."

    STATUS_CODE=$(curl -s -o response.json -w "%{http_code}" \
      --digest \
      --user "${MONGO_PUBLIC_KEY}:$MONGO_PRIVATE_KEY" \
      --request DELETE \
      --header "Accept: application/vnd.atlas.2023-01-01+json" \
      "https://cloud.mongodb.com/api/atlas/v2/groups/${MONGO_GROUP_ID}/accessList/${IP_ADDRESS}")

    echo "Response status: $STATUS_CODE"
    echo "Response body:"
    cat response.json
    echo ""

    if [[ "$STATUS_CODE" -ne 200 && "$STATUS_CODE" -ne 202 && "$STATUS_CODE" -ne 204 ]]; then
      echo "⚠️ Warning: failed to remove IP from MongoDB Atlas."
    else
      echo "✅ IP successfully removed from MongoDB Atlas."
    fi
  displayName: 'Remove IP from MongoDB Atlas allowlist'
  env:
    MONGO_PRIVATE_KEY: $(MONGO_PRIVATE_KEY)
  condition: always()
